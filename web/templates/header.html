{{define "app-header"}}
<header class="pos-topbar">
  <div class="brand-lockup">
    <div class="brand-mark" aria-hidden="true">
      <svg viewBox="0 0 24 24">
        <path d="M6 13.87A4.49 4.49 0 0 1 7.5 5a5.5 5.5 0 0 1 9 0A4.49 4.49 0 0 1 18 13.87"></path>
        <path d="M6 13h12l-1 8H7z"></path>
        <path d="M8 17h8"></path>
      </svg>
    </div>
    <div>
      <h1>{{.RestaurantName}}</h1>
      <span>POS v{{.AppVersion}}</span>
    </div>
  </div>

  <nav class="app-tabs" aria-label="Primary">
    <a class="app-tab {{if eq .ActivePage "pos"}}active{{end}}" href="/">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <rect x="3" y="3" width="7" height="7" rx="1"></rect>
        <rect x="14" y="3" width="7" height="7" rx="1"></rect>
        <rect x="14" y="14" width="7" height="7" rx="1"></rect>
        <rect x="3" y="14" width="7" height="7" rx="1"></rect>
      </svg>
      POS
    </a>
    <a class="app-tab {{if eq .ActivePage "sales"}}active{{end}}" href="/sales">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1z"></path>
        <path d="M8 7h8"></path>
        <path d="M8 11h8"></path>
        <path d="M8 15h5"></path>
      </svg>
      Sales
    </a>
    <a class="app-tab {{if eq .ActivePage "admin"}}active{{end}}" href="/admin">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M9.67 3.34a2 2 0 0 1 4.66 0 2 2 0 0 0 2.82 1.16 2 2 0 0 1 3.3 3.3 2 2 0 0 0 1.16 2.82 2 2 0 0 1 0 4.66 2 2 0 0 0-1.16 2.82 2 2 0 0 1-3.3 3.3 2 2 0 0 0-2.82 1.16 2 2 0 0 1-4.66 0 2 2 0 0 0-2.82-1.16 2 2 0 0 1-3.3-3.3 2 2 0 0 0-1.16-2.82 2 2 0 0 1 0-4.66A2 2 0 0 0 3.55 7.8a2 2 0 0 1 3.3-3.3 2 2 0 0 0 2.82-1.16z"></path>
        <circle cx="12" cy="12" r="3"></circle>
      </svg>
      Admin
    </a>
  </nav>

  <div class="topbar-actions">
    <time class="topbar-clock" id="topbar-clock" datetime="">--:--</time>
  </div>
</header>
{{end}}

{{define "clock-script"}}
<script>
  function printInvoicePreview(trigger) {
    const receipt = trigger.closest(".invoice-preview-modal")?.querySelector(".invoice-preview-receipt");
    if (!receipt) return;

    const frame = document.createElement("iframe");
    frame.setAttribute("aria-hidden", "true");
    frame.style.position = "fixed";
    frame.style.right = "0";
    frame.style.bottom = "0";
    frame.style.width = "0";
    frame.style.height = "0";
    frame.style.border = "0";
    document.body.appendChild(frame);

    const doc = frame.contentWindow.document;
    doc.open();
    doc.write(`<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Invoice</title>
  <style>
    @page { size: 58mm auto; margin: 0; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0;
      width: 58mm;
      background: #ffffff;
      color: #111827;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 11px;
      line-height: 1.35;
    }
    .invoice-preview-receipt {
      width: 58mm;
      max-width: 58mm;
      margin: 0;
      padding: 1.5mm;
      color: #111827;
      background: #ffffff;
    }
    .invoice-preview-restaurant { text-align: center; }
    .invoice-preview-restaurant h3 {
      margin: 0;
      color: #111827;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 14px;
      font-weight: 800;
    }
    .invoice-preview-rule {
      height: 1px;
      margin: 10px 0 8px;
      background-image: repeating-linear-gradient(90deg, #cbd3df 0 6px, transparent 6px 11px);
    }
    .invoice-preview-meta {
      display: grid;
      gap: 4px;
      color: #4b5563;
    }
    .invoice-preview-meta span,
    .invoice-preview-thanks {
      color: #6b7280;
    }
    .invoice-preview-table-head,
    .invoice-preview-line,
    .invoice-preview-total {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: start;
    }
    .invoice-preview-table-head {
      color: #6b7280;
      font-size: 10px;
      text-transform: uppercase;
    }
    .invoice-preview-line {
      padding-top: 6px;
      color: #111827;
      word-break: break-word;
    }
    .invoice-preview-line div {
      display: grid;
      gap: 3px;
    }
    .invoice-preview-line strong {
      font-weight: 600;
    }
    .invoice-preview-line span {
      padding-left: 12px;
      font-size: 9px;
    }
    .invoice-preview-total {
      padding-top: 2px;
      border-top: 1px solid #cbd3df;
      color: #111827;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
    }
    .invoice-preview-thanks {
      margin: 12px 0 0;
      text-align: center;
      font-size: 11px;
      line-height: 1.5;
    }
  </style>
</head>
<body>${receipt.outerHTML}</body>
</html>`);
    doc.close();

    const cleanup = () => setTimeout(() => frame.remove(), 300);
    frame.contentWindow.addEventListener("afterprint", cleanup, { once: true });

    setTimeout(() => {
      frame.contentWindow.focus();
      frame.contentWindow.print();
      setTimeout(() => {
        if (document.body.contains(frame)) cleanup();
      }, 10000);
    }, 50);
  }

  (() => {
    const clock = document.getElementById("topbar-clock");
    const updateClock = () => {
      const now = new Date();
      clock.textContent = now.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
      clock.setAttribute("datetime", now.toISOString());
    };
    updateClock();
    setInterval(updateClock, 30000);
  })();
</script>
{{end}}
