{{define "invoice"}}
<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Invoice #{{.Invoice.ID}}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/app.css" rel="stylesheet">
</head>
<body>
  <div class="receipt-58mm">
    <div class="text-center mb-2">
      <h6 class="m-0">Bill of Fare</h6>
      <small>Invoice #{{.Invoice.ID}}</small>
    </div>

    <div class="mb-2 receipt-meta">
      <div><strong>Date:</strong> {{.Invoice.CreatedAt.Format "2006-01-02 15:04:05"}}</div>
    </div>

    <table class="table table-sm table-borderless receipt-table">
      <thead>
        <tr>
          <th>Item</th>
          <th class="text-end">Qty</th>
          <th class="text-end">Amt</th>
        </tr>
      </thead>
      <tbody>
      {{range .Invoice.Items}}
        <tr>
          <td>{{.ItemName}}</td>
          <td class="text-end">{{.Quantity}}</td>
          <td class="text-end">₹{{.Subtotal}}</td>
        </tr>
        <tr>
          <td colspan="3" class="text-muted small ps-2">@ ₹{{.UnitPrice}} each</td>
        </tr>
      {{end}}
      </tbody>
    </table>

    <hr class="my-2">
    <div class="d-flex justify-content-between total-row">
      <strong>Total</strong>
      <strong>₹{{.Invoice.Total}}</strong>
    </div>

    <div class="no-print mt-3 d-flex gap-2">
      <button class="btn btn-primary btn-sm" onclick="window.print()">Print</button>
      <a href="/" class="btn btn-secondary btn-sm">Back</a>
    </div>
  </div>
</body>
</html>
{{end}}
