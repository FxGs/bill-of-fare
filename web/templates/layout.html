{{define "layout"}}
<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Bill of Fare POS</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://unpkg.com/htmx.org@1.9.12"></script><link href="/static/css/app.css" rel="stylesheet"></head>
<body><div class="container py-4"><h1>Bill of Fare POS</h1><div class="row"><div class="col-md-8">
{{range .Categories}}<h3 class="mt-4">{{.Name}}</h3><div class="row">{{range .Items}}<div class="col-md-6"><div class="card mb-3"><div class="card-body"><h5>{{.Name}}</h5>{{if .Variant}}<p class="text-muted mb-1">{{.Variant}}</p>{{end}}<p>₹{{.Price}}</p><button class="btn btn-primary" hx-post="/cart/add" hx-vals='{"item_id":"{{.ID}}"}' hx-target="#cart" hx-swap="innerHTML">Add</button></div></div></div>{{end}}</div>{{end}}
</div><div class="col-md-4"><div id="cart">{{template "cart" .}}</div></div></div></div></body></html>
{{end}}
