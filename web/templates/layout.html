{{define "layout"}}
<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bill of Fare POS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <link href="/static/css/app.css" rel="stylesheet">
</head>
<body class="app-shell">
  <nav class="navbar navbar-dark bg-dark shadow-sm mb-4"><div class="container"><span class="navbar-brand mb-0 h1">Bill of Fare POS</span></div></nav>
  <div class="container pb-4">
    <div class="row g-4">
      <div class="col-lg-8">
        {{range .Categories}}{{ $cat := . }}
        <section class="menu-category mb-4">
          <h4 class="category-title">{{.Name}}</h4>
          <div class="row g-3">
            {{range .Menu}}
            <div class="col-md-6">
              <div class="card menu-card h-100">
                <div class="card-body d-flex flex-column">
                  <h5 class="mb-2">{{.Name}}</h5>
                  <p class="text-muted small mb-3">{{len .Variants}} option(s) available</p>
                  <button class="btn btn-primary mt-auto" hx-post="/menu/options" hx-vals='{"category_id":"{{$cat.ID}}","name":"{{.Name}}"}' hx-target="#variantModalBody" hx-swap="innerHTML" data-bs-toggle="modal" data-bs-target="#variantModal">Select Variant</button>
                </div>
              </div>
            </div>
            {{end}}
          </div>
        </section>
        {{end}}
      </div>
      <div class="col-lg-4">
        <div id="cart">{{template "cart" .}}</div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="variantModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header"><h5 class="modal-title">Choose Variant</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div id="variantModalBody" class="modal-body"></div>
      </div>
    </div>
  </div>
</body>
</html>
{{end}}
